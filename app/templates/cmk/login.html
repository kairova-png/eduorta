<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ЦМК - Вход</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Inter', -apple-system, sans-serif; }
        body {
            min-height: 100vh; display: flex; align-items: center; justify-content: center;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #312e81 100%);
            position: relative; overflow: hidden;
        }
        body::before {
            content: ''; position: absolute; width: 500px; height: 500px;
            background: radial-gradient(circle, rgba(99,102,241,0.15), transparent 70%);
            top: -100px; right: -100px; border-radius: 50%;
        }
        body::after {
            content: ''; position: absolute; width: 400px; height: 400px;
            background: radial-gradient(circle, rgba(16,185,129,0.1), transparent 70%);
            bottom: -100px; left: -100px; border-radius: 50%;
        }
        .login-wrapper {
            max-width: 420px; width: 100%; padding: 1.5rem; position: relative; z-index: 1;
            animation: fadeUp 0.6s ease-out;
        }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

        .login-card {
            background: rgba(255,255,255,0.95); backdrop-filter: blur(20px);
            border-radius: 20px; padding: 2.5rem; box-shadow: 0 25px 50px rgba(0,0,0,0.25);
            border: 1px solid rgba(255,255,255,0.2);
        }
        .brand-icon {
            width: 64px; height: 64px; border-radius: 16px; margin: 0 auto 1rem;
            background: linear-gradient(135deg, #6366f1, #818cf8); display: flex;
            align-items: center; justify-content: center; font-size: 1.8rem; color: #fff;
            box-shadow: 0 8px 20px rgba(99,102,241,0.3);
        }
        .form-control {
            border-radius: 10px; padding: 0.7rem 1rem; font-size: 0.9rem;
            border: 1.5px solid #e2e8f0; transition: all 0.2s;
        }
        .form-control:focus { border-color: #6366f1; box-shadow: 0 0 0 3px rgba(99,102,241,0.15); }
        .input-group-text {
            border-radius: 10px 0 0 10px; background: #f8fafc; border: 1.5px solid #e2e8f0;
            border-right: none; color: #94a3b8;
        }
        .input-group .form-control { border-radius: 0 10px 10px 0; border-left: none; }
        .input-group .form-control:focus + .input-group-text,
        .input-group:focus-within .input-group-text { border-color: #6366f1; }
        .btn-login {
            background: linear-gradient(135deg, #6366f1, #4f46e5); border: none;
            padding: 0.75rem; border-radius: 10px; font-weight: 600; font-size: 0.95rem;
            color: #fff; transition: all 0.3s; width: 100%;
        }
        .btn-login:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(99,102,241,0.4); color: #fff; }
        .btn-login:active { transform: translateY(0); }

        .alert { border-radius: 10px; font-size: 0.85rem; border: none; }
        .back-link { color: rgba(255,255,255,0.5); font-size: 0.8rem; text-decoration: none; transition: color 0.2s; }
        .back-link:hover { color: rgba(255,255,255,0.9); }

        .password-toggle { cursor: pointer; border-left: 1px solid #e2e8f0 !important; }
    </style>
</head>
<body>
    <div class="login-wrapper">
        <div class="login-card">
            <div class="text-center mb-4">
                <div class="brand-icon"><i class="bi bi-mortarboard-fill"></i></div>
                <h5 class="fw-bold mb-1">EduOrta CMK</h5>
                <p class="text-muted small mb-0">Система документооборота ЦМК</p>
            </div>

            {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
            {% for category, message in messages %}
            <div class="alert alert-{{ 'danger' if category == 'error' else category }} d-flex align-items-center gap-2 py-2 px-3">
                <i class="bi bi-{{ 'exclamation-circle' if category == 'error' else 'info-circle' }}"></i>
                <span>{{ message }}</span>
            </div>
            {% endfor %}
            {% endif %}
            {% endwith %}

            <form method="POST">
                <div class="mb-3">
                    <label class="form-label small fw-semibold text-muted">Логин</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-person"></i></span>
                        <input type="text" name="username" class="form-control" placeholder="Введите логин" required autofocus>
                    </div>
                </div>
                <div class="mb-4">
                    <label class="form-label small fw-semibold text-muted">Пароль</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-lock"></i></span>
                        <input type="password" name="password" id="passwordInput" class="form-control" placeholder="Введите пароль" required>
                        <span class="input-group-text password-toggle" onclick="togglePassword()">
                            <i class="bi bi-eye" id="eyeIcon"></i>
                        </span>
                    </div>
                </div>
                <button type="submit" class="btn btn-login">
                    <i class="bi bi-box-arrow-in-right me-1"></i> Войти в систему
                </button>
            </form>
        </div>

        <div class="text-center mt-4">
            <a href="{{ url_for('main.index') }}" class="back-link">
                <i class="bi bi-arrow-left"></i> Вернуться к расписанию
            </a>
        </div>
    </div>

    <script>
        function togglePassword() {
            const input = document.getElementById('passwordInput');
            const icon = document.getElementById('eyeIcon');
            if (input.type === 'password') {
                input.type = 'text';
                icon.className = 'bi bi-eye-slash';
            } else {
                input.type = 'password';
                icon.className = 'bi bi-eye';
            }
        }
    </script>
</body>
</html>
