{% extends "cmk/base_cmk.html" %}
{% block title %}{{ 'Редактировать' if umk else 'Создать' }} УМК{% endblock %}
{% block extra_css %}<link href="https://cdn.jsdelivr.net/npm/quill@2.0.2/dist/quill.snow.css" rel="stylesheet">{% endblock %}
{% block content %}
<h4 class="mb-4"><i class="bi bi-collection"></i> {{ 'Редактировать' if umk else 'Создать' }} УМК</h4>
<form method="POST" id="umk-form">
    <div class="card mb-3">
        <div class="card-body">
            <div class="row g-3">
                <div class="col-md-6">
                    <label class="form-label">Название</label>
                    <input type="text" name="title" class="form-control" required value="{{ umk.title if umk else '' }}">
                </div>
                <div class="col-md-6">
                    <label class="form-label">РУП</label>
                    <select name="rup_id" class="form-select" required>
                        <option value="">Выберите...</option>
                        {% for r in rups %}
                        <option value="{{ r.id }}" {{ 'selected' if umk and umk.rup_id == r.id }}>{{ r.title }}</option>
                        {% endfor %}
                    </select>
                </div>
            </div>
        </div>
    </div>
    <div class="card mb-3">
        <div class="card-header">Содержание</div>
        <div class="card-body">
            <textarea name="content" class="rich-editor">{{ umk.content|default('', true) }}</textarea>
        </div>
    </div>
    <div class="d-flex gap-2">
        <button type="submit" class="btn btn-primary"><i class="bi bi-check-lg"></i> Сохранить</button>
        <a href="{{ url_for('cmk.umk_list') }}" class="btn btn-outline-secondary">Отмена</a>
    </div>
</form>
{% endblock %}
{% block extra_js %}
<script src="https://cdn.jsdelivr.net/npm/quill@2.0.2/dist/quill.js"></script>
<script>
document.addEventListener('DOMContentLoaded', function() {
    document.querySelectorAll('.rich-editor').forEach(function(textarea) {
        const div = document.createElement('div');
        div.innerHTML = textarea.value;
        div.style.minHeight = '300px';
        textarea.style.display = 'none';
        textarea.parentNode.insertBefore(div, textarea);
        const quill = new Quill(div, {
            theme: 'snow',
            modules: { toolbar: [[{header:[1,2,3,false]}],['bold','italic','underline'],[{list:'ordered'},{list:'bullet'}],['link','blockquote'],[{align:[]}],['clean']] }
        });
        document.getElementById('umk-form').addEventListener('submit', function() { textarea.value = quill.root.innerHTML; });
    });
});
</script>
{% endblock %}
