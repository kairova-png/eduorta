{% extends "cmk/base_cmk.html" %}
{% block title %}{{ 'Редактировать' if rup else 'Создать' }} РУП{% endblock %}
{% block content %}
<h4 class="mb-4">
    <i class="bi bi-journal-bookmark"></i> {{ 'Редактировать' if rup else 'Создать' }} РУП
</h4>

<form method="POST">
    <div class="card mb-3">
        <div class="card-body">
            <div class="row g-3">
                <div class="col-12">
                    <label class="form-label">Название</label>
                    <input type="text" name="title" class="form-control" required
                           value="{{ rup.title if rup else '' }}" placeholder="Рабочий учебный план по специальности...">
                </div>
                <div class="col-md-4">
                    <label class="form-label">ЦМК</label>
                    <select name="commission_id" class="form-select" required>
                        <option value="">Выберите...</option>
                        {% for c in commissions %}
                        <option value="{{ c.id }}" {{ 'selected' if rup and rup.commission_id == c.id }}>{{ c.name }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-md-4">
                    <label class="form-label">Специальность</label>
                    <select name="specialty_id" class="form-select" required>
                        <option value="">Выберите...</option>
                        {% for s in specialties %}
                        <option value="{{ s.id }}" {{ 'selected' if rup and rup.specialty_id == s.id }}>{{ s.code }} - {{ s.name_ru }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-md-4">
                    <label class="form-label">Учебный год</label>
                    <select name="academic_year_id" class="form-select" required>
                        <option value="">Выберите...</option>
                        {% for y in years %}
                        <option value="{{ y.id }}" {{ 'selected' if rup and rup.academic_year_id == y.id }}>{{ y.name }}</option>
                        {% endfor %}
                    </select>
                </div>
            </div>
        </div>
    </div>

    <div class="card mb-3">
        <div class="card-header">Содержание</div>
        <div class="card-body">
            <textarea name="content" id="editor-content" class="rich-editor">{{ rup.content|default('', true) }}</textarea>
        </div>
    </div>

    <div class="d-flex gap-2">
        <button type="submit" class="btn btn-primary"><i class="bi bi-check-lg"></i> Сохранить</button>
        <a href="{{ url_for('cmk.rup_list') }}" class="btn btn-outline-secondary">Отмена</a>
    </div>
</form>
{% endblock %}

{% block extra_js %}
<script src="https://cdn.jsdelivr.net/npm/quill@2.0.2/dist/quill.js"></script>
<link href="https://cdn.jsdelivr.net/npm/quill@2.0.2/dist/quill.snow.css" rel="stylesheet">
<script>
document.addEventListener('DOMContentLoaded', function() {
    document.querySelectorAll('.rich-editor').forEach(function(textarea) {
        const div = document.createElement('div');
        div.innerHTML = textarea.value;
        div.style.minHeight = '300px';
        textarea.style.display = 'none';
        textarea.parentNode.insertBefore(div, textarea);

        const quill = new Quill(div, {
            theme: 'snow',
            modules: {
                toolbar: [
                    [{ header: [1, 2, 3, false] }],
                    ['bold', 'italic', 'underline', 'strike'],
                    [{ list: 'ordered' }, { list: 'bullet' }],
                    [{ indent: '-1' }, { indent: '+1' }],
                    ['link', 'blockquote', 'code-block'],
                    [{ align: [] }],
                    ['clean']
                ]
            }
        });

        textarea.closest('form').addEventListener('submit', function() {
            textarea.value = quill.root.innerHTML;
        });
    });
});
</script>
{% endblock %}
