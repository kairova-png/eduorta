{% extends "base.html" %}

{% block title %}Отчёты - APEC Petrotechnic{% endblock %}

{% block content %}
<h2><i class="bi bi-graph-up"></i> Отчёты</h2>

<div class="row mt-4">
    <div class="col-md-6 mb-4">
        <div class="card h-100">
            <div class="card-body text-center">
                <i class="bi bi-clock-history display-4 text-primary"></i>
                <h4 class="mt-3">Учёт часов</h4>
                <p class="text-muted">План/факт выполнения часов по группам</p>
                <a href="{{ url_for('reports.hours') }}" class="btn btn-primary">
                    Открыть
                </a>
            </div>
        </div>
    </div>
    <div class="col-md-6 mb-4">
        <div class="card h-100">
            <div class="card-body text-center">
                <i class="bi bi-file-earmark-text display-4 text-success"></i>
                <h4 class="mt-3">Табель преподавателя</h4>
                <p class="text-muted">Часы преподавателя за месяц</p>
                <a href="{{ url_for('reports.teacher') }}" class="btn btn-success">
                    Открыть
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
