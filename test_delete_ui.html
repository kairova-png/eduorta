<!DOCTYPE html>
<html>
<head>
    <title>Тест удаления расписания</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.7.2/font/bootstrap-icons.css">
</head>
<body>
    <div class="container mt-5">
        <h2>🗑️ Удаление расписания</h2>
        
        <div class="alert alert-danger">
            <i class="bi bi-exclamation-triangle"></i>
            <strong>ВНИМАНИЕ!</strong> Удаление расписания необратимо. Будут удалены ВСЕ пары для выбранной группы и семестра.
        </div>
        
        <div class="mb-3">
            <label for="groupId" class="form-label">ID группы (БНГС 1-25 = 17)</label>
            <input type="number" class="form-control" id="groupId" value="17">
        </div>
        
        <div class="mb-3">
            <label for="semester" class="form-label">Семестр</label>
            <input type="number" class="form-control" id="semester" value="2">
        </div>
        
        <button class="btn btn-danger" onclick="deleteGroupSchedule()">
            <i class="bi bi-trash3"></i> Удалить расписание
        </button>
        
        <div id="result" class="mt-3"></div>
    </div>

    <script>
        function deleteGroupSchedule() {
            const groupId = document.getElementById('groupId').value;
            const semester = document.getElementById('semester').value;
            
            if (!confirm(`Удалить все расписание для группы ID ${groupId} семестр ${semester}?`)) {
                return;
            }
            
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = '<div class="alert alert-info">Удаление...</div>';
            
            fetch(`/schedule/delete_group_schedule/${groupId}/${semester}`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                }
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    resultDiv.innerHTML = `<div class="alert alert-success">✅ ${data.message}</div>`;
                } else {
                    resultDiv.innerHTML = `<div class="alert alert-danger">❌ ${data.error}</div>`;
                }
            })
            .catch(error => {
                resultDiv.innerHTML = `<div class="alert alert-danger">❌ Ошибка: ${error.message}</div>`;
            });
        }
    </script>
</body>
</html>
